<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pine Grove Gatherings</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="pool.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Roboto:wght@300&display=swap" rel="stylesheet">
</head>
<body>
    <div id="password-prompt" style="display: none;">
        <h2>Enter Password</h2>
        <input type="password" id="password-input" placeholder="Password">
        <br>
        <button type="button">Submit</button>
        <p id="password-error" style="color: red;"></p>
    </div>
    <div id="main-content" style="display: none;">
        <header>
            <img src="images/banner.jpg" alt="Cozy Dinner" class="banner">
            <h1>Pine Grove Gatherings</h1>
            <nav>
                <a href="index.html">All Events</a>
                <a href="admin.html" class="admin-link">Admin (Private)</a>
                <a href="gallery.html">Picture Gallery</a>
            </nav>
        </header>
        <main>
            <section id="events-list-section">
                <div id="events-loading">Loading events…</div>
                <div id="events-list-container"></div>
                <div id="no-events" style="display: none;">
                    <p>No upcoming events scheduled. Check back soon!</p>
                </div>
            </section>
        </main>
        <footer>
            <p>Private event | Pine Grove Gatherings</p>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="theme-loader.js"></script>
    <script src="auth.js"></script>
    <script src="pool-config.js"></script>
    <script src="script-index.js"></script>
</body>
</html>
